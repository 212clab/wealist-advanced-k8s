apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wealist-dev

resources:
  # Shared resources (ConfigMap, Secret for all services)
  - ../../../../../k8s/base/shared
  # Service-specific resources
  - ../../base

images:
  - name: wealist/storage-service
    newName: localhost:5001/storage-service
    newTag: v1

replicas:
  - name: storage-service
    count: 1

patches:
  - target:
      kind: ConfigMap
      name: storage-service-config
    patch: |-
      - op: replace
        path: /data/ENV
        value: "dev"
