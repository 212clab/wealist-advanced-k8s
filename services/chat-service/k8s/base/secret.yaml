# Chat Service Secret - Local Development
apiVersion: v1
kind: Secret
metadata:
  name: chat-service-secret
type: Opaque
stringData:
  DATABASE_URL: "postgres://chat_service:chat_service_password@postgres:5432/wealist_chat_db?sslmode=disable"
  DB_USER: "chat_service"
  DB_PASSWORD: "chat_service_password"
  JWT_SECRET: "local-dev-jwt-secret-min-32-characters-here"
