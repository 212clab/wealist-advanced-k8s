# Noti Service Secret - Local Development
apiVersion: v1
kind: Secret
metadata:
  name: noti-service-secret
type: Opaque
stringData:
  DATABASE_URL: "postgres://noti_service:noti_service_password@postgres:5432/wealist_noti_db?sslmode=disable"
  REDIS_PASSWORD: ""
  SECRET_KEY: "local-dev-secret-key-min-32-characters-here"
  INTERNAL_API_KEY: "local-dev-internal-api-key"
