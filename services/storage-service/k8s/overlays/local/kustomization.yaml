apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wealist-local

resources:
  - ../../base

images:
  - name: storage-service
    newName: 212clab/wealist-storage-service
    newTag: v1

replicas:
  - name: storage-service
    count: 1

patches:
  - target:
      kind: ConfigMap
      name: storage-service-config
    patch: |-
      - op: replace
        path: /data/ENV
        value: "dev"
