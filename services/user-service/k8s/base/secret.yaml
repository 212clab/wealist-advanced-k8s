# User Service Secret - Local Development
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
type: Opaque
stringData:
  DATABASE_URL: "postgres://user_service:user_service_password@postgres:5432/wealist_user_db?sslmode=disable"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "user_service"
  DB_PASSWORD: "user_service_password"
  DB_NAME: "wealist_user_db"
  REDIS_PASSWORD: ""
  JWT_SECRET: "local-dev-jwt-secret-min-32-characters-here"
