# Board Service Secret - Local Development
apiVersion: v1
kind: Secret
metadata:
  name: board-service-secret
type: Opaque
stringData:
  DB_USER: "board_service"
  DB_PASSWORD: "board_service_password"
  JWT_SECRET: "local-dev-jwt-secret-min-32-characters-here"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
