# =============================================================================
# Shared Secret - Local Development
# =============================================================================
# 주의: 프로덕션에서는 External Secrets를 사용하세요!

apiVersion: v1
kind: Secret
metadata:
  name: wealist-shared-secrets
  labels:
    app.kubernetes.io/name: wealist
    app.kubernetes.io/component: shared-secrets
type: Opaque
stringData:
  # JWT & Auth
  JWT_SECRET: "local-dev-jwt-secret-min-32-characters-here"
  SECRET_KEY: "local-dev-secret-key-min-32-characters-here"

  # Database Credentials
  DB_PASSWORD: "postgres"
  POSTGRES_PASSWORD: "postgres"

  # Redis
  REDIS_PASSWORD: ""

  # MinIO (S3)
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"

  # Internal API Key
  INTERNAL_API_KEY: "local-dev-internal-api-key"
