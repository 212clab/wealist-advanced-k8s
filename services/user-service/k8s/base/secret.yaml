apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user_service:user_service_password@postgres:5432/user_db?sslmode=disable"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "user_service"
  DB_PASSWORD: "user_service_password"
  DB_NAME: "user_db"
  REDIS_PASSWORD: "redis_password"
  JWT_SECRET: "changeme-jwt-secret-key"
