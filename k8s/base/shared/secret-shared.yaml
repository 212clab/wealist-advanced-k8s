# =============================================================================
# Shared Secret - 모든 서비스가 공유하는 민감한 설정
# =============================================================================
# 주의: 이 파일은 개발 환경용입니다!
# 프로덕션에서는 External Secrets 또는 Vault를 사용하세요.
#
# 사용법 (각 서비스 deployment.yaml):
#   envFrom:
#     - secretRef:
#         name: wealist-shared-secrets
#
# 업그레이드 경로:
#   1. 현재: K8s Secret (Git에 저장 - 개발용만!)
#   2. 권장: External Secrets + AWS Secrets Manager
#   3. 고급: HashiCorp Vault + Vault Agent Injector
#
# Base64 인코딩 방법:
#   echo -n "your-value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: wealist-shared-secrets
  labels:
    app.kubernetes.io/name: wealist
    app.kubernetes.io/component: shared-secrets
type: Opaque
stringData:
  # ===========================================================================
  # JWT & Auth
  # ===========================================================================
  JWT_SECRET: "dev-jwt-secret-key-change-in-production-min-32-chars"
  SECRET_KEY: "dev-jwt-secret-key-change-in-production-min-32-chars"

  # ===========================================================================
  # Database Credentials
  # 각 서비스별 DATABASE_URL은 개별 Secret에서 관리
  # ===========================================================================
  DB_PASSWORD: "postgres_dev_password"
  POSTGRES_PASSWORD: "postgres_dev_password"

  # ===========================================================================
  # Redis
  # ===========================================================================
  REDIS_PASSWORD: "redis_dev_password"

  # ===========================================================================
  # MinIO (S3 호환)
  # ===========================================================================
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"

  # ===========================================================================
  # Internal API Key (서비스 간 인증)
  # ===========================================================================
  INTERNAL_API_KEY: "internal-dev-api-key"
