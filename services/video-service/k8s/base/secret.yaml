# Video Service Secret - Local Development
apiVersion: v1
kind: Secret
metadata:
  name: video-service-secret
type: Opaque
stringData:
  DATABASE_URL: "postgres://video_service:video_service_password@postgres:5432/wealist_video_db?sslmode=disable"
  REDIS_HOST: "redis"
  REDIS_PASSWORD: ""
  SECRET_KEY: "local-dev-secret-key-min-32-characters-here"
  LIVEKIT_API_KEY: "devkey"
  LIVEKIT_API_SECRET: "secret"
