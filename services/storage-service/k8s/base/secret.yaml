# Storage Service Secret - Local Development
apiVersion: v1
kind: Secret
metadata:
  name: storage-service-secret
type: Opaque
stringData:
  DATABASE_URL: "postgres://storage_service:storage_service_password@postgres:5432/wealist_storage_db?sslmode=disable"
  JWT_SECRET: "local-dev-jwt-secret-min-32-characters-here"
  S3_BUCKET: "wealist-files"
  S3_REGION: "ap-northeast-2"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
  S3_ENDPOINT: "http://minio:9000"
  S3_PUBLIC_ENDPOINT: "http://localhost:9000"
