apiVersion: v1
kind: Secret
metadata:
  name: chat-service-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://chat_service:chat_service_password@postgres:5432/wealist_chat_db?sslmode=disable"
  DB_USER: "chat_service"
  DB_PASSWORD: "chat_service_password"
  JWT_SECRET: "your-super-secret-jwt-key-change-this-in-production-min-32-chars"
